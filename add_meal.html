{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Log Your MJ Takeaway</h2>
                
                <!-- The Form (Requirement #3) -->
                <form method="POST">
                    {% csrf_token %} <!-- Mandatory Security (Requirement #10) -->
                    
                    <!-- Restaurant Name -->
                    <div class="mb-3">
                        <label class="form-label">Restaurant Name</label>
                        <input type="text" name="restaurant" class="form-control" placeholder="e.g. Sultan's Grill" required>
                    </div>

                    <!-- Meal Name -->
                    <div class="mb-3">
                        <label class="form-label">What did you eat?</label>
                        <input type="text" name="meal_name" class="form-control" placeholder="e.g. Chicken Shish & Salad" required>
                    </div>

                    <!-- MJ Tolerance Scale -->
                    <div class="mb-3">
                        <label class="form-label">Stomach Tolerance (1-5)</label>
                        <select name="tolerance" class="form-select">
                            <option value="5">5 - Felt Great (No side effects)</option>
                            <option value="4">4 - Mostly fine</option>
                            <option value="3">3 - Slight indigestion</option>
                            <option value="2">2 - Heavy nausea</option>
                            <option value="1">1 - Avoid at all costs!</option>
                        </select>
                    </div>

                    <!-- Notes -->
                    <div class="mb-3">
                        <label class="form-label">Tips for others?</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="e.g. Asked for sauce on the side..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-mj w-100">Save Meal to Diary</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
