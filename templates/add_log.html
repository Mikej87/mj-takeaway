{% extends 'base.html' %}

{% block content %}
<div class="mb-3">
    <label for="dish" class="form-label font-weight-bold">Select Your Dish</label>
    <select name="dish" id="dish" class="form-select border-2 shadow-sm">
        <option selected disabled>Choose from the menu...</option>
        
        {% for dish in dishes %}
            <option value="{{ dish.id }}">{{ dish.name }}</option>
        {% endfor %}
        
    </select>
    <div class="form-text">What did you order today?</div>
</div>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 mt-4">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">🐟 Log your Chippy Meal</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">What did you have?</label>
                        <select name="meal" class="form-select border-2">
                            <option selected disabled>Choose a meal...</option>
                            {% for meal in meals %}
                                <option value="{{ meal.id }}">{{ meal.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Grease Level (1-5)</label>
                        <input type="range" name="grease" min="1" max="5" step="1" class="form-range" id="greaseRange">
                        <div class="d-flex justify-content-between text-muted small">
                            <span>Dry</span>
                            <span>Soaked</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="feeling" class="form-control border-2" rows="3" placeholder="How did it sit? (e.g. 'Instant regret' or 'Pure bliss')"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Save Log Entry</button>
                        <a href="{% url 'history' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
