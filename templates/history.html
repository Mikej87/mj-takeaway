{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header bg-white">
        <h3 class="mb-0">My Meal History</h3>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Meal/Item</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.created_at|date:"d/m/Y H:i" }}</td>
                        <td>{{ log.item_name }}</td>
                        <td>{{ log.notes|default:"-" }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">No meals logged yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
