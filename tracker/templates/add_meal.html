{% extends 'base.html' %}
{% block content %}
<form method="POST" class="card p-4 shadow">
    {% csrf_token %}
    <h3>Log your Chippy Meal</h3>
    <select name="meal" class="form-select mb-3">
        {% for meal in meals %}
            <option value="{{ meal.id }}">{{ meal }}</option>
        {% endfor %}
    </select>
    <label>Grease Level (1-5):</label>
    <input type="range" name="grease" min="1" max="5" class="form-range">
    <textarea name="feeling" class="form-control mt-3" placeholder="How did it sit?"></textarea>
    <button type="submit" class="btn btn-success mt-3">Save Log</button>
</form>
{% endblock %}
